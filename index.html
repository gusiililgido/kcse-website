<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KCSE 2026 Resources</title>
  <style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #020617, #0f172a);
  color: white;
  margin: 0;
  padding: 10px;
}

h1 {
  font-size: 22px;
}

.card {
  background: #1e293b;
  margin: 12px 0;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.4);
}

button {
  background: #22c55e;
  border: none;
  padding: 10px;
  color: white;
  cursor: pointer;
  border-radius: 6px;
  width: 100%;
}

input {
  padding: 10px;
  margin: 5px 0;
  width: 100%;
  border-radius: 6px;
  border: none;
}

.hidden {
  display: none;
}

  </style>
</head>

<body>

<h1>KCSE 2026 RESOURCES 📚</h1>
<p>Get Predictions, Notes & Past Papers Instantly 🚀</p>

<!-- PRODUCTS -->
<div class="card">
  <h3>KCSE 2026 Prediction</h3>
  <p>50/=</p>
  <button onclick="buy('Prediction - 50/=')">Buy</button>
</div>

<div class="card">
  <h3>Setbook Notes & Essays</h3>
  <p>30/=</p>
  <button onclick="buy('Setbook - 30/=')">Buy</button>
</div>

<div class="card">
  <h3>Past Papers</h3>
  <p>25/=</p>
  <button onclick="buy('Past Papers - 25/=')">Buy</button>
</div>

<div class="card">
  <h3>Any Subject Notes</h3>
  <p>50/=</p>
  <button onclick="buy('Notes - 50/=')">Buy</button>
</div>

<!-- PAYMENT -->
<div id="pay" class="hidden">
  <h2>Manual Payment</h2>
  <p>Send to: <b>0754346922</b><br>Name: Cyprian</p>

  <input type="text" id="phone" placeholder="Your Phone Number">
  <button onclick="submit()">Submit Payment</button>

  <p id="status"></p>

  <h3>Your Requests</h3>
  <ul id="list"></ul>
</div>

<!-- ADMIN LOGIN -->
<div id="adminBox" class="hidden" style="position:fixed; top:20%; left:10%; right:10%; background:#111827; padding:20px; border-radius:10px;">
  <h3>Admin Login</h3>

  <input type="text" id="adminUser" placeholder="Username"><br>
  <input type="password" id="adminPass" placeholder="Password"><br>

  <button onclick="loginAdmin()">Login</button>
</div>

<!-- ADMIN DASHBOARD -->
<div id="adminPanel" style="display:none; background:#111827; padding:15px; margin-top:20px; border-radius:10px;">
  <h2>Admin Dashboard</h2>

  <ul id="adminList"></ul>
</div>

<script>
let selected = "";
let payments = JSON.parse(localStorage.getItem("payments")) || [];

function buy(product){
  selected = product;
  document.getElementById("pay").classList.remove("hidden");
}

// USER SUBMIT
function submit(){
  let phone = document.getElementById("phone").value;
  if(!phone) return alert("Enter phone");

  let data = {
    product:selected,
    phone:phone,
    status:"Pending",
    link:"https://your-download-link.com"
  };

  payments.push(data);
  localStorage.setItem("payments", JSON.stringify(payments));

  // WhatsApp
  let msg = "Hello, I have paid for " + selected + ". My number: " + phone;
  window.open("https://wa.me/254704956915?text="+encodeURIComponent(msg));

  document.getElementById("status").innerHTML="⏳ Pending approval...";
  document.getElementById("phone").value="";

  load();
}

// LOAD USER LIST
function load(){
  let list = document.getElementById("list");
  list.innerHTML="";

  payments.forEach(p=>{
    let li=document.createElement("li");

    if(p.status==="Approved"){
      li.innerHTML = p.product+" - "+p.status+
      " ✅ <a href='"+p.link+"' target='_blank'>Download</a>";
    } else {
      li.innerHTML = p.product+" - "+p.status+" ⏳";
    }

    list.appendChild(li);
  });
}

// ADMIN LOGIN
function openAdmin(){
  document.getElementById("adminBox").classList.toggle("hidden");
}

function loginAdmin(){
  let user = document.getElementById("adminUser").value;
  let pass = document.getElementById("adminPass").value;

  if(user === "jinxzen" && pass === "2222"){
    
    alert("Welcome Admin");

    // SHOW ADMIN PANEL
    document.getElementById("adminPanel").style.display = "block";

    // OPTIONAL: hide login box
    document.getElementById("adminBox").style.display = "none";

    loadAdminData();

  } else {
    alert("Wrong credentials");
  }
}

// ADMIN LIST
function loadAdmin(){
  let list=document.getElementById("adminList");
  list.innerHTML="";

  payments.forEach((p,i)=>{
    let li=document.createElement("li");

    li.innerHTML = p.product+" - "+p.phone+" ("+p.status+")";

    if(p.status==="Pending"){
      let btn=document.createElement("button");
      btn.innerText="Approve";
      btn.onclick=function(){
        payments[i].status="Approved";
        localStorage.setItem("payments", JSON.stringify(payments));
        loadAdmin();
        load();
      };
      li.appendChild(btn);
    }

    list.appendChild(li);
  });
}

window.onload=load;
</script>

</body>
</html>
